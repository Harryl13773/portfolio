<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Pre-paint theme pick (avoids wrong-theme flash): user's stored toggle choice wins, else follow the machine's light/dark appearance
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var light = stored
            ? stored === 'light'
            : window.matchMedia('(prefers-color-scheme: light)').matches;
          if (light) document.documentElement.dataset.theme = 'light';
        } catch (e) {
          // storage/matchMedia unavailable — stay dark
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/src/assets/initials.ico" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Harry Lian — Computer Engineer</title>
    <meta
      name="description"
      content="Harry Lian is a Computer Engineering graduate from Ohio State building full-stack web applications, embedded systems, and AI-powered backends."
    />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Open Graph — controls the LinkedIn/Slack/iMessage link preview -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://harrylian.com" />
    <meta property="og:title" content="Harry Lian — Computer Engineer" />
    <meta
      property="og:description"
      content="Portfolio of Harry Lian: full-stack web applications, embedded systems, and AI-powered backends."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
